min_version = "2024.11.1"

[tools]
python = "3.12"
uv = "0.11.21"
node = "24"
npm = "11"
go = "1.26.4"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Install root development tools"
run = "uv sync --group dev"

[tasks."install:js"]
description = "Install root JavaScript development dependencies"
run = "npm install"

[tasks."install:all"]
description = "Install all workspace packages with development dependencies"
run = "uv sync --all-packages --group dev --all-extras"

[tasks."install:core"]
description = "Install ocrbridge-core development dependencies"
run = "uv sync --package ocrbridge-core --group dev"

[tasks."install:easyocr"]
description = "Install ocrbridge-easyocr development dependencies"
run = "uv sync --package ocrbridge-easyocr --group dev"

[tasks."install:tesseract"]
description = "Install ocrbridge-tesseract development dependencies"
run = "uv sync --package ocrbridge-tesseract --group dev"

[tasks."install:ocrmac"]
description = "Install ocrbridge-ocrmac development dependencies"
run = "uv sync --package ocrbridge-ocrmac --extra dev"

[tasks."install:service"]
description = "Install ocr-service development dependencies"
run = "uv sync --package ocr-service --group dev"

[tasks."install:service:all-engines"]
description = "Install ocr-service with all optional engines"
run = "uv sync --package ocr-service --group dev --all-extras"

[tasks."install:pdfocr"]
description = "Install pdfocr CLI for searchable PDF generation"
run = "go install github.com/gardar/ocrchestra/cmd/pdfocr@latest"

[tasks.doctor]
description = "Check external OCR tool prerequisites for the full local gate"
run = '''
#!/usr/bin/env bash
set -euo pipefail

missing=0

require_cmd() {
  local cmd="$1"
  local install_hint="$2"
  if command -v "$cmd" >/dev/null 2>&1; then
    printf 'ok: %s -> %s\n' "$cmd" "$(command -v "$cmd")"
  else
    printf 'missing: %s\n  install: %s\n' "$cmd" "$install_hint" >&2
    missing=1
  fi
}

warn_cmd() {
  local cmd="$1"
  local install_hint="$2"
  if command -v "$cmd" >/dev/null 2>&1; then
    printf 'ok: %s -> %s\n' "$cmd" "$(command -v "$cmd")"
  else
    printf 'warning: %s not found\n  install: %s\n' "$cmd" "$install_hint" >&2
  fi
}

require_cmd tesseract 'macOS: brew install tesseract; Linux: install tesseract-ocr'
require_cmd pdfinfo 'macOS: brew install poppler; Linux: install poppler-utils'
warn_cmd pdfocr 'mise run install:pdfocr'

if [ -n "${EASYOCR_MODULE_PATH:-}" ]; then
  easyocr_root="$EASYOCR_MODULE_PATH"
else
  easyocr_root="$HOME/.EasyOCR"
fi
printf 'info: EasyOCR model cache: %s\n' "$easyocr_root"
if [ ! -d "$easyocr_root/model" ]; then
  printf 'warning: EasyOCR model directory is missing; first full EasyOCR test may download models.\n' >&2
fi

if command -v docker >/dev/null 2>&1; then
  if docker info >/dev/null 2>&1; then
    printf 'ok: docker daemon reachable\n'
  else
    printf 'warning: docker client exists, but daemon is not reachable. Run mise run docker:doctor before container builds.\n' >&2
  fi
else
  printf 'warning: docker not found; container tasks need Docker, Colima, or Podman-compatible Docker CLI.\n' >&2
fi

if [ "$missing" -ne 0 ]; then
  printf '\nFull OCR checks require the missing tools above. Use nix develop for pinned tools or install them on the host.\n' >&2
  exit 1
fi
'''

[tasks."lint:core"]
description = "Run Ruff lint checks for ocrbridge-core"
run = "uv --directory packages/ocrbridge-core run ruff check src tests"

[tasks."lint:easyocr"]
description = "Run Ruff lint checks for ocrbridge-easyocr"
run = "uv --directory packages/ocrbridge-easyocr run ruff check src tests"

[tasks."lint:tesseract"]
description = "Run Ruff lint checks for ocrbridge-tesseract"
run = "uv --directory packages/ocrbridge-tesseract run ruff check src tests"

[tasks."lint:ocrmac"]
description = "Run Ruff lint checks for ocrbridge-ocrmac"
run = "uv --directory packages/ocrbridge-ocrmac run ruff check src tests"

[tasks."lint:service"]
description = "Run Ruff lint checks for ocr-service"
run = "uv --directory apps/ocr-service run ruff check src tests"

[tasks.lint]
description = "Run Ruff lint checks for all workspace projects"
depends = ["lint:core", "lint:tesseract", "lint:easyocr", "lint:ocrmac", "lint:service"]

[tasks."format:core"]
description = "Format ocrbridge-core with Ruff"
run = "uv --directory packages/ocrbridge-core run ruff format src tests"

[tasks."format:easyocr"]
description = "Format ocrbridge-easyocr with Ruff"
run = "uv --directory packages/ocrbridge-easyocr run ruff format src tests"

[tasks."format:tesseract"]
description = "Format ocrbridge-tesseract with Ruff"
run = "uv --directory packages/ocrbridge-tesseract run ruff format src tests"

[tasks."format:ocrmac"]
description = "Format ocrbridge-ocrmac with Ruff"
run = "uv --directory packages/ocrbridge-ocrmac run ruff format src tests"

[tasks."format:service"]
description = "Format ocr-service with Ruff"
run = "uv --directory apps/ocr-service run ruff format src tests"

[tasks.format]
description = "Format all workspace projects with Ruff"
depends = ["format:core", "format:tesseract", "format:easyocr", "format:ocrmac", "format:service"]

[tasks."format-check:core"]
description = "Verify ocrbridge-core formatting"
run = "uv --directory packages/ocrbridge-core run ruff format --check src tests"

[tasks."format-check:easyocr"]
description = "Verify ocrbridge-easyocr formatting"
run = "uv --directory packages/ocrbridge-easyocr run ruff format --check src tests"

[tasks."format-check:tesseract"]
description = "Verify ocrbridge-tesseract formatting"
run = "uv --directory packages/ocrbridge-tesseract run ruff format --check src tests"

[tasks."format-check:ocrmac"]
description = "Verify ocrbridge-ocrmac formatting"
run = "uv --directory packages/ocrbridge-ocrmac run ruff format --check src tests"

[tasks."format-check:service"]
description = "Verify ocr-service formatting"
run = "uv --directory apps/ocr-service run ruff format --check src tests"

[tasks."format-check"]
description = "Verify formatting for all workspace projects"
depends = ["format-check:core", "format-check:tesseract", "format-check:easyocr", "format-check:ocrmac", "format-check:service"]

[tasks."typecheck:core"]
description = "Run pyright for ocrbridge-core"
run = "uv --directory packages/ocrbridge-core run pyright"

[tasks."typecheck:easyocr"]
description = "Run pyright for ocrbridge-easyocr"
run = "uv --directory packages/ocrbridge-easyocr run pyright"

[tasks."typecheck:tesseract"]
description = "Run pyright for ocrbridge-tesseract"
run = "uv --directory packages/ocrbridge-tesseract run pyright"

[tasks."typecheck:ocrmac"]
description = "Run pyright for ocrbridge-ocrmac"
run = "uv --directory packages/ocrbridge-ocrmac run pyright"

[tasks."typecheck:service"]
description = "Run ty for ocr-service"
depends = ["install:service:all-engines"]
run = "uv --directory apps/ocr-service run ty check"

[tasks.typecheck]
description = "Run static type checks for all workspace projects"
depends = ["typecheck:core", "typecheck:tesseract", "typecheck:easyocr", "typecheck:ocrmac", "typecheck:service"]

[tasks."test:core"]
description = "Run ocrbridge-core tests"
run = "uv --directory packages/ocrbridge-core run pytest"

[tasks."test:easyocr"]
description = "Run ocrbridge-easyocr tests"
run = "uv --directory packages/ocrbridge-easyocr run pytest"

[tasks."test:easyocr:fast"]
description = "Run ocrbridge-easyocr tests without real model integration or slow tests"
run = "uv --directory packages/ocrbridge-easyocr run pytest -m 'not integration and not slow'"

[tasks."test:tesseract"]
description = "Run ocrbridge-tesseract tests"
run = "uv --directory packages/ocrbridge-tesseract run pytest"

[tasks."test:tesseract:fast"]
description = "Run ocrbridge-tesseract tests without real Tesseract integration or slow tests"
run = "uv --directory packages/ocrbridge-tesseract run pytest -m 'not integration and not slow'"

[tasks."test:ocrmac"]
description = "Run ocrbridge-ocrmac tests"
run = "uv --directory packages/ocrbridge-ocrmac run pytest"

[tasks."test:service"]
description = "Run ocr-service tests"
run = "uv --directory apps/ocr-service run pytest"

[tasks."test:service:fast"]
description = "Run ocr-service tests without real EasyOCR or ocrmac E2E tests"
run = "uv --directory apps/ocr-service run pytest tests/unit tests/integration -m 'not tesseract and not easyocr and not ocrmac' --ignore=tests/integration/test_lifespan.py --ignore=tests/unit/api/test_dynamic_routes.py --ignore=tests/unit/api/test_error_handling.py"

[tasks."test:fast"]
description = "Run deterministic tests that avoid real OCR engine downloads and macOS-only E2E"
depends = ["test:core", "test:tesseract:fast", "test:easyocr:fast", "test:service:fast"]

[tasks.test]
description = "Run all workspace tests"
depends = ["test:core", "test:tesseract", "test:easyocr", "test:ocrmac", "test:service"]

[tasks.check]
description = "Run lint, formatting checks, type checks, and tests"
depends = ["lint", "format-check", "typecheck", "test"]

[tasks."check:fast"]
description = "Run lint, formatting checks, type checks, and deterministic fast tests"
depends = ["lint", "format-check", "typecheck", "test:fast"]

[tasks."check:full"]
description = "Run external prerequisite checks before the full local gate"
depends = ["doctor", "check"]

[tasks."dev:service"]
description = "Run ocr-service development server"
run = "uv --directory apps/ocr-service run uvicorn src.main:app --reload --host 0.0.0.0 --port 8000"

[tasks."docker:service:lite"]
description = "Build the lite ocr-service Docker image"
run = "docker build --target lite -f apps/ocr-service/Dockerfile -t ocr-service:lite ."

[tasks."docker:doctor"]
description = "Check that the Docker-compatible daemon is reachable"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if ! command -v docker >/dev/null 2>&1; then
  printf 'docker CLI not found. Install Docker Desktop, Colima, or a Podman-compatible Docker CLI.\n' >&2
  exit 1
fi

if ! docker info >/dev/null 2>&1; then
  printf 'docker daemon is not reachable. Start Docker Desktop, Colima, or Podman, then retry.\n' >&2
  docker context ls >&2 || true
  exit 1
fi

docker version
'''

[tasks."docker:service:full"]
description = "Build the full ocr-service Docker image"
run = "docker build --target full -f apps/ocr-service/Dockerfile -t ocr-service:full ."

[tasks."compose:service:lite"]
description = "Run the lite ocr-service compose stack"
run = "docker compose -f apps/ocr-service/docker-compose.base.yml -f apps/ocr-service/docker-compose.lite.yml up -d"

[tasks."compose:service:full"]
description = "Run the full ocr-service compose stack"
run = "docker compose -f apps/ocr-service/docker-compose.base.yml -f apps/ocr-service/docker-compose.yml up -d"
