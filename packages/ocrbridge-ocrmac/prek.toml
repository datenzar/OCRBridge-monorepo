minimum_prek_version = "0.3.4"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "conventional-commits-msg"
name = "Conventional Commits (commit-msg)"
language = "system"
entry = "uv run gitlint --config .gitlint --msg-filename"
stages = ["commit-msg"]
pass_filenames = true
always_run = true

[[repos.hooks]]
id = "conventional-commits-ci"
name = "Conventional Commits (CI range)"
language = "system"
entry = "bash -lc 'gitlint --config .gitlint --commits \"${PREK_COMMIT_RANGE:?PREK_COMMIT_RANGE is required}\"'"
stages = ["manual"]
pass_filenames = false
always_run = true
