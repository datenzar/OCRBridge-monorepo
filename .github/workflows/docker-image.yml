name: Docker Image CI

on:
  push:
    branches: [main]
    paths:
      - "apps/ocr-service/**"
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker-image.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ocr-service/**"
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:
    inputs:
      build_full:
        description: "Build full flavor"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flavor: lite
            target: lite
            always_build: true
          - flavor: full
            target: full
            always_build: false
    steps:
      - name: Free disk space
        if: matrix.flavor == 'full'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.flavor }} Docker image
        if: |
          matrix.always_build ||
          github.event_name == 'workflow_dispatch' && inputs.build_full ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/ocr-service/Dockerfile
          target: ${{ matrix.target }}
          push: false
          tags: |
            ocr-service:${{ matrix.flavor }}
            ocr-service:${{ matrix.flavor }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
